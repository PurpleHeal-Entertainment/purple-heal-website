<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperación de GitHub - Purple Heal</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #333; padding: 2rem; border-radius: 12px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #a96ec5; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #a96ec5; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #8e44ad; }
        #msg { margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Recuperar Acceso</h1>
        <p>Introduce tu Token de GitHub para reactivar el panel.</p>
        <input type="text" id="owner" placeholder="Usuario GitHub (ej: purpleheal)" value="purpleheal">
        <input type="text" id="repo" placeholder="Repositorio (ej: purple-heal-website)" value="purple-heal-website">
        <input type="password" id="token" placeholder="Tu GitHub PAT (ghp_...)">
        <button onclick="save()">GUARDAR Y REINICIAR</button>
        <div id="msg"></div>
    </div>

    <script>
        function save() {
            const owner = document.getElementById('owner').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!token) {
                document.getElementById('msg').innerText = "❌ Por favor, ingresa el Token.";
                return;
            }

            // Save to localStorage (same keys used by GithubSync)
            localStorage.setItem('ph_github_token', token);
            localStorage.setItem('ph_github_config', JSON.stringify({
                OWNER: owner,
                REPO: repo,
                BRANCH: 'master'
            }));

            document.getElementById('msg').innerHTML = "✅ ¡Acceso restaurado! Redirigiendo...";
            setTimeout(() => {
                window.location.href = 'admin-home.html';
            }, 1500);
        }
    </script>
</body>
</html>
